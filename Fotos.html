    <style>
         body{
            margin: 0;
            font-family: "Roboto", sans-serif;
            font-optical-sizing: 1000;
        }

        .container{
            background-color: transparent;
            position: fixed;
            right: 50px;
            top: 32px;
            font-size: 30px;
        }

        .menu-link{
            color: black;
            text-decoration: none;
            margin-left: 30px;
        }

        .menu-link:hover{
            background-color: rgba(0, 63, 179, 0.384);
            padding: 10px 30px;
            border-radius: 8px;
            box-shadow: 5px 5px rgba(0,0,0,0.5);
        }

        .container2{
            background-color: transparent;
            position: fixed;
            left: 850px;
            top: 32px;
            font-size: 30px;
        }

        .menu-link-home{
            color: black;
            text-decoration: none;
            margin-left: 30px;

        .menu-link-home:hover{
            background-color: rgba(0, 63, 179, 0.384);
            padding: 10px 30px;
            border-radius: 8px;

        .main-footer {
            background-color: #333333; 
            color: white;
            padding: 100px 20px;        
            margin-top: 1000px;         
            width: 97.85%;
        }

        .footer-content {
            text-align: left;
             padding-left: 20px;        /* Zentriert Text und Bilder im Footer */
        }

        .Logo{
            position: fixed;
            left: 30px;
            top: 30px;
            height: 90px;
        }

        .TitelbildFotos{
            position: relative;
            height: 110vh;
            width: 100%;
            object-fit: cover;
            filter: brightness(70%);
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
            margin-bottom: -50px;
        }

        .Kinderfotos {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px;            
            max-width: 600px;     
            margin: 300px 100px;    
        }

        .Kinderfotos img {
            width: 100%;
            height: 300px;        
            object-fit: cover;    
            border-radius: 8px;   
            transition: transform 0.3s; 
        }


        .Kinderfotos img:hover {
            transform: scale(1.9);
            cursor: pointer;
        }

        .TextKinderfotos{
            position: absolute;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 30px;
            color: black;
            text-shadow: 0 0 10px rgba(37, 205, 247, 0.8);
            left: 230px;
            top: 1300px;
        }

        .ErfolgeFotos {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px;            
            max-width: 1200px;     
            margin: 200px 100px;
            position: absolute;
            top: 1235px;    
            left: 700px;
        }

        .ErfolgeFotos img {
            width: 100%;
            height: 300px;        
            object-fit: cover;    
            border-radius: 8px;   
            transition: transform 0.3s; 
        }


        .ErfolgeFotos img:hover {
            transform: scale(1.9);
            cursor: pointer;
        }

        .Erfolge{
            position: absolute;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 30px;
            color: black;
            text-shadow: 0 0 10px rgba(37, 205, 247, 0.8);
            left: 1230px;
            top: 1300px;
        }

        .ActionFotos {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px;            
            max-width: 1500px;     
            margin: 200px 100px;
            position: absolute;
            top: 2200px;    
            left: 140px;
        }

        .ActionFotos img {
            width: 100%;
            height: 300px;        
            object-fit: cover;    
            border-radius: 8px;   
            transition: transform 0.3s; 
        }


        .ActionFotos img:hover {
            transform: scale(1.9);
            cursor: pointer;
        }

        .Action{
            position: absolute;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 30px;
            color: black;
            text-shadow: 0 0 10px rgba(37, 205, 247, 0.8);
            left: 850px;
            top: 2250px;
        }







        .TitelFotos{
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            font-size: 50px;
            text-shadow: 2px 2px rgba(0,0,0,0.5);
