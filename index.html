        body{
            margin: 0;
            font-family: "Roboto", sans-serif;
            font-optical-sizing: 1000;
        }
        

        .Titelbild{
            height: 110vh;
            width: 100%;
            object-fit: cover;
            filter: brightness(70%);
             mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
            margin-bottom: -50px;
        }

        .container{
            background-color: transparent;
            position: fixed;
            right: 50px;
            top: 32px;
            font-size: 30px;
        }

        .menu-link{
            color: black;
            text-decoration: none;
            margin-left: 30px;
        }

        .menu-link:hover{
            background-color: rgba(0, 63, 179, 0.384);
            padding: 10px 30px;
            border-radius: 8px;
            box-shadow: 5px 5px rgba(0,0,0,0.5);
        } 

        .containerTitel{
            color: black;
            position: absolute;
            top: 10%;
            left: 10%;
            font-size: 35px;
            text-shadow: 5px 5px rgba(0,0,0,0.5);
        }

        .Bild-Resultate{
            height: 50vh;
            display: block;
            transition: transform 0.6s ease;
        }

        .bild-link-container:hover .Bild-Resultate {
            transform: scale(1.1);
        }

        .bild-link-container{
            position: absolute;
            left: 450px;
            top: 1100px;
            width: auto;
        }

        .bild-text{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Perfekt zentrieren */
            color: white;
            font-size: 30px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.7); /* Halbtransparenter Hintergrund */
            border-radius: 8px;
            padding: 10px 20px;
            pointer-events: none; /* Klick geht durch den Text aufs Bild */
            opacity: 0; /* Erst unsichtbar */
            transition: opacity 0.8s ease;
        }

        .bild-link-container:hover .bild-text{
            opacity: 1;
        }

        .Bild-über-mich{
